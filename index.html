<!DOCTYPE html>
<html lang="pt-br">

<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quicklist</title>

    <link rel="stylesheet" href="style.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">

</head>

<body>
    <div class="container">

        <div class="top">
            <img src="assets/Vector.svg" alt="">
            <h1>quicklist</h1>
        </div>

        <div class="link">
            <button >
                <a href="#">
                    <img src="assets/link-button.svg" alt="">
                </a>
            </button>
        </div>

        <header>
            <h1>Compras da semana</h1>
        </header>

        <form action="">

            <div class="items">
                <input id="newItem" type="text" placeholder="Adicione um novo item">
                <button id="addBtn">Adicionar item</button>
            </div>

            <ul id="list">

                <li class="item">
                    <label class="checkbox-label">
                        <input type="checkbox">
                        <div class="checkbox-img"></div>
                        <p> Pão de forma</p>
                    </label>
                    <button class="delete">
                    <img src="assets/Frame-3.svg" alt="">
                    </button>
                    
                </li>

                 <li class="item">
                    <label class="checkbox-label">
                    <div class="checkbox-img"></div>
                    <input type="checkbox">
                    <p> Café preto</p>
                    </label>
                    <button class="delete">
                    <img src="assets/Frame-3.svg" alt="">
                    </button>

                </li>

                <li class="item">
                    <label class="checkbox-label">
                    <div class="checkbox-img"></div>
                    <input type="checkbox">
                    <p> Suco de laranja</p>
                    </label>
                    <button class="delete">
                    <img src="assets/Frame-3.svg" alt="">
                    </button>

                </li>

                <li class="item">
                    <label class="checkbox-label">
                    <div class="checkbox-img"></div>
                    <input type="checkbox">
                    <p> Bolacha </p>
                    </label>
                    <button class="delete">
                    <img src="assets/Frame-3.svg" alt="">
                    </button>

                </li>
            </ul>

            <div id="alert" class="alert">
                <img src="assets/warning-circle-filled.svg" alt="">
            <span>O item foi removido da lista</span>
            <button id="close" class="close">
            <img src="assets/delete-small.svg" alt="">
            </button>
            </div>
        </form>
        <script src="script.js"></script>
    </div>
</body>

</html>
